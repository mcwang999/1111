<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Polaris 插件演示（Version2）</title>
    <style>
      :root {
        --bg: #060815;
        --panel: rgba(255, 255, 255, 0.06);
        --panel2: rgba(10, 15, 44, 0.35);
        --line: rgba(255, 255, 255, 0.12);
        --fg: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.6);
        --muted2: rgba(255, 255, 255, 0.4);
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", "Microsoft YaHei UI", "Microsoft YaHei",
          "PingFang SC", Arial, sans-serif;
        color: var(--fg);
        background: radial-gradient(1200px 700px at 15% 20%, rgba(100, 120, 255, 0.35), transparent),
          radial-gradient(1000px 600px at 90% 0%, rgba(180, 70, 255, 0.25), transparent), var(--bg);
      }
      .grid {
        background-image: linear-gradient(to right, rgba(255, 255, 255, 0.06) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(255, 255, 255, 0.06) 1px, transparent 1px);
        background-size: 44px 44px;
      }
      .wrap {
        height: 100%;
        display: flex;
        flex-direction: column;
      }
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 14px 18px;
        border-bottom: 1px solid var(--line);
        background: rgba(8, 12, 30, 0.55);
        backdrop-filter: blur(12px);
      }
      .title {
        font-weight: 700;
        letter-spacing: 0.02em;
      }
      .sub {
        font-size: 12px;
        color: var(--muted);
        margin-top: 2px;
      }
      .pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.06);
        font-size: 12px;
        color: var(--muted);
      }
      .btn {
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.06);
        color: var(--fg);
        border-radius: 999px;
        padding: 9px 12px;
        font-weight: 700;
        font-size: 12px;
        cursor: pointer;
      }
      .btn:hover {
        background: rgba(255, 255, 255, 0.1);
      }
      .btn:disabled {
        opacity: 0.55;
        cursor: default;
      }
      .btn.plain-dark {
        color: #1f2737;
        background: #edf2ff;
        border-color: #d7e1f0;
      }
      .layout {
        flex: 1;
        min-height: 0;
        display: grid;
        grid-template-columns: 72px 360px 1fr 420px;
      }
      .rail {
        border-right: 1px solid var(--line);
        background: rgba(8, 12, 30, 0.65);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        padding: 14px 0;
      }
      .rail .app {
        width: 42px;
        height: 42px;
        display: grid;
        place-items: center;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.06);
        font-weight: 800;
        font-size: 12px;
        color: var(--muted);
      }
      .panel {
        border-right: 1px solid var(--line);
        background: rgba(8, 12, 30, 0.45);
        padding: 16px;
        overflow: auto;
      }
      .panel h3 {
        margin: 0;
        font-size: 12px;
        color: #fff;
      }
      .chat {
        padding: 18px;
        overflow: auto;
      }
      .chatbox {
        border: 1px solid var(--line);
        background: var(--panel2);
        border-radius: 24px;
        padding: 18px;
        min-height: calc(100% - 2px);
        position: relative;
        overflow: hidden;
      }
      .chatbox::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(to bottom right, rgba(255, 255, 255, 0.06), transparent);
        pointer-events: none;
      }
      .chatbox .msg {
        position: relative;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.06);
        border-radius: 18px;
        padding: 14px;
        color: var(--muted);
        margin-top: 12px;
        font-size: 13px;
      }
      .plugin {
        border-left: 1px solid var(--line);
        background: rgba(8, 12, 30, 0.55);
        display: flex;
        flex-direction: column;
        min-width: 0;
      }
      .plugin-head {
        padding: 16px 18px;
        border-bottom: 1px solid var(--line);
      }
      .plugin-body {
        padding: 16px 18px 18px;
        overflow: auto;
      }
      .card {
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.06);
        border-radius: 18px;
        padding: 14px;
      }
      .row {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }
      .stack {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .muted {
        color: var(--muted);
      }
      .muted2 {
        color: var(--muted2);
      }
      .badge {
        border: 1px solid #d9e3f2;
        background: #f5f8fd;
        padding: 5px 9px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 800;
        color: #4f5f79;
      }
      .badge.risk {
        border-color: #f2d28d;
        background: #fff4cf;
        color: #8c5a00;
      }
      .badge.opportunity {
        border-color: #a7d9bf;
        background: #e8f7ee;
        color: #1f6b45;
      }
      .badge.watch {
        border-color: #cad7ea;
        background: #edf3fb;
        color: #5f6f89;
      }
      .badge.high {
        border-color: #f2c57d;
        background: #fff1cb;
        color: #915d00;
      }
      .badge.medium {
        border-color: #9ac8ef;
        background: #eaf5ff;
        color: #2c628b;
      }
      .list {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-top: 12px;
      }
      .item {
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.06);
        border-radius: 18px;
        padding: 12px;
        cursor: pointer;
      }
      .item:hover {
        background: rgba(255, 255, 255, 0.09);
      }
      .item .t1 {
        font-size: 13px;
        font-weight: 800;
        margin-top: 8px;
      }
      .item .t2 {
        font-size: 12px;
        color: var(--muted);
        margin-top: 6px;
        line-height: 1.35;
      }
      .login {
        max-width: 1040px;
        margin: 0 auto;
        padding: 24px;
        display: grid;
        grid-template-columns: 1fr 520px;
        gap: 18px;
        height: 100%;
        align-items: center;
      }
      .login .hero {
        padding: 28px;
        border-radius: 28px;
        border: 1px solid #d7e1f0;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.95), rgba(244, 248, 255, 0.94));
        min-height: 520px;
        color: #1f2737;
        box-shadow: 0 18px 36px rgba(176, 188, 211, 0.18);
      }
      .login .form {
        padding: 28px;
        border-radius: 28px;
        border: 1px solid #d7e1f0;
        background: rgba(255, 255, 255, 0.94);
        box-shadow: 0 18px 36px rgba(176, 188, 211, 0.18);
      }
      .field {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-top: 14px;
      }
      label {
        font-size: 12px;
        font-weight: 800;
        color: #1f2737;
      }
      select,
      input,
      textarea {
        width: 100%;
        border: 1px solid #d7e1f0;
        background: rgba(255, 255, 255, 0.96);
        color: #1f2737;
        border-radius: 18px;
        padding: 12px 14px;
        outline: none;
        font-size: 13px;
      }
      select::placeholder,
      input::placeholder,
      textarea::placeholder {
        color: #93a0b7;
      }
      textarea {
        resize: vertical;
        min-height: 86px;
      }
      .danger {
        border: 1px solid rgba(244, 63, 94, 0.25);
        background: rgba(244, 63, 94, 0.12);
        color: rgba(255, 228, 230, 0.95);
        border-radius: 18px;
        padding: 12px 14px;
        margin-top: 14px;
        font-size: 13px;
      }
      .login-badge-row {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }
      .login-pill {
        border-radius: 999px;
        padding: 6px 12px;
        background: #edf2ff;
        border: 1px solid #d9e3f6;
        color: #5f6f95;
        font-size: 12px;
        font-weight: 700;
      }
      .drawer {
        position: fixed;
        inset: 0;
        display: none;
        z-index: 40;
      }
      .drawer.open {
        display: block;
      }
      .drawer .mask {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
      }
      .drawer .sheet {
        position: absolute;
        top: 0;
        right: 0;
        height: 100%;
        width: min(580px, 100%);
        border-left: 1px solid var(--line);
        background: rgba(8, 12, 30, 0.86);
        backdrop-filter: blur(14px);
        padding: 18px;
        overflow: auto;
      }
      .sheet h2 {
        margin: 0;
        font-size: 16px;
      }
      .sheet .close {
        position: absolute;
        top: 14px;
        right: 14px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.06);
        color: var(--fg);
        width: 36px;
        height: 36px;
        cursor: pointer;
        font-weight: 900;
      }
      .worksuite-shell {
        height: 100%;
        display: flex;
        flex-direction: column;
        background: #e8eef8;
        color: #1f2430;
      }
      .worksuite-topbar {
        height: 44px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 18px;
        background: #dfe7f7;
        border-bottom: 1px solid rgba(136, 151, 181, 0.28);
      }
      .window-brand {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 13px;
        font-weight: 700;
        color: #4b5877;
      }
      .window-dot {
        width: 12px;
        height: 12px;
        border-radius: 999px;
        background: linear-gradient(135deg, #7d66ff, #b468ff);
        box-shadow: 0 0 0 3px rgba(125, 102, 255, 0.16);
      }
      .window-actions {
        display: flex;
        align-items: center;
        gap: 16px;
        color: #55627e;
        font-size: 18px;
      }
      .worksuite-main {
        flex: 1;
        min-height: 0;
        display: grid;
        grid-template-columns: 96px 384px minmax(420px, 1fr);
        background: #edf2fb;
      }
      .sidebar-rail {
        min-width: 0;
        background: linear-gradient(180deg, #d7e2f3 0%, #dbe5f4 100%);
        border-right: 1px solid rgba(150, 165, 192, 0.34);
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 14px 10px 12px;
        gap: 10px;
      }
      .sidebar-brand {
        width: 62px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        margin-bottom: 8px;
      }
      .brand-pill {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        font-size: 13px;
        font-weight: 800;
        color: #fff;
        background: linear-gradient(135deg, #956eff, #d07af6);
      }
      .brand-mini {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        background: rgba(255, 255, 255, 0.9);
        color: #8b5cf6;
        font-size: 13px;
        box-shadow: 0 6px 12px rgba(122, 131, 166, 0.12);
      }
      .rail-actions {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .rail-action {
        width: 100%;
        min-height: 58px;
        border-radius: 18px;
        padding: 8px 6px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 6px;
        color: #5b6782;
        position: relative;
        cursor: pointer;
      }
      .rail-action.active {
        background: rgba(255, 255, 255, 0.86);
        color: #24314d;
        box-shadow: inset 0 0 0 1px rgba(177, 190, 214, 0.45);
      }
      .brief-entry {
        min-height: 72px;
        padding-top: 12px;
      }
      .rail-icon {
        width: 28px;
        height: 28px;
        border-radius: 10px;
        display: grid;
        place-items: center;
        background: rgba(255, 255, 255, 0.64);
        font-size: 16px;
      }
      .rail-action.active .rail-icon {
        background: linear-gradient(135deg, #5f84ff, #7a63ff);
        color: #fff;
      }
      .rail-label {
        font-size: 11px;
        line-height: 1.1;
      }
      .rail-badge {
        position: absolute;
        top: 8px;
        right: 10px;
        min-width: 18px;
        height: 18px;
        padding: 0 5px;
        border-radius: 999px;
        background: #f35b55;
        color: #fff;
        display: grid;
        place-items: center;
        font-size: 11px;
        font-weight: 700;
      }
      .rail-spacer {
        flex: 1;
      }
      .inbox-panel {
        min-width: 0;
        padding: 14px 14px 14px 12px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        background: #e9f0fb;
        border-right: 1px solid rgba(150, 165, 192, 0.28);
      }
      .inbox-search {
        min-height: 48px;
        border-radius: 14px;
        background: #dce6f5;
        box-shadow: inset 0 0 0 1px rgba(164, 177, 202, 0.35);
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 0 14px;
        color: #74819a;
        font-size: 14px;
      }
      .inbox-search .kbd {
        margin-left: auto;
        color: #8794aa;
      }
      .inbox-card {
        flex: 1;
        min-height: 0;
        background: rgba(255, 255, 255, 0.92);
        border-radius: 18px;
        box-shadow: inset 0 0 0 1px rgba(220, 227, 238, 0.9), 0 10px 22px rgba(174, 184, 207, 0.16);
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .inbox-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        color: #1d2738;
      }
      .inbox-header h2 {
        margin: 0;
        font-size: 18px;
      }
      .inbox-header-main {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .inbox-control-btn {
        width: 32px;
        height: 32px;
        border-radius: 10px;
        border: 1px solid #d7e1f0;
        background: #f3f7fe;
        color: #62718b;
        display: grid;
        place-items: center;
        cursor: pointer;
      }
      .inbox-control-btn:hover {
        background: #eaf1fb;
      }
      .avatar-strip {
        display: flex;
        flex-wrap: wrap;
        gap: 10px 14px;
        padding-bottom: 12px;
        border-bottom: 1px solid #eef2f7;
      }
      .avatar-chip {
        width: 56px;
        text-align: center;
      }
      .avatar-chip span {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        margin: 0 auto 6px;
        font-size: 15px;
        font-weight: 800;
        color: #fff;
      }
      .avatar-chip em {
        display: block;
        font-style: normal;
        font-size: 11px;
        line-height: 1.25;
        color: #57647d;
      }
      .thread-list {
        flex: 1;
        min-height: 0;
        overflow: auto;
        display: flex;
        flex-direction: column;
        gap: 6px;
        padding-right: 2px;
      }
      .thread-item {
        display: grid;
        grid-template-columns: 56px 1fr auto;
        gap: 12px;
        align-items: center;
        padding: 10px 12px;
        border-radius: 14px;
        cursor: pointer;
        transition: background 0.16s ease, box-shadow 0.16s ease;
      }
      .thread-item:hover {
        background: #f5f8fd;
      }
      .thread-item.selected {
        background: #dfe9ff;
        box-shadow: inset 0 0 0 1px rgba(155, 180, 241, 0.42);
      }
      .thread-avatar {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        font-size: 18px;
        color: #fff;
      }
      .thread-main {
        min-width: 0;
      }
      .thread-title-row {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
      }
      .thread-title-text {
        font-size: 15px;
        font-weight: 700;
        color: #24314d;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .thread-meta-tag {
        border-radius: 999px;
        background: #fff3c4;
        color: #a26e00;
        font-size: 11px;
        padding: 2px 6px;
        flex: 0 0 auto;
      }
      .thread-preview {
        margin-top: 6px;
        font-size: 13px;
        color: #78849a;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .thread-side {
        align-self: stretch;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        justify-content: space-between;
        color: #8d98ac;
        font-size: 12px;
      }
      .thread-unread {
        min-width: 20px;
        height: 20px;
        padding: 0 6px;
        border-radius: 999px;
        background: #f35b55;
        color: #fff;
        display: grid;
        place-items: center;
        font-size: 11px;
        font-weight: 700;
      }
      .main-thread {
        min-width: 0;
        background: #f7f9fe;
        display: flex;
        flex-direction: column;
        border-right: 1px solid rgba(150, 165, 192, 0.24);
      }
      .thread-header {
        min-height: 96px;
        padding: 16px 24px 14px;
        background: rgba(255, 255, 255, 0.78);
        border-bottom: 1px solid #e6ebf5;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }
      .thread-header-main {
        display: flex;
        align-items: center;
        gap: 14px;
        min-width: 0;
      }
      .thread-header-avatar {
        width: 46px;
        height: 46px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #4d7dff, #5a64ff);
        color: #fff;
        font-size: 21px;
        font-weight: 800;
      }
      .thread-header-copy {
        min-width: 0;
      }
      .thread-header-copy .title {
        color: #1f2737;
      }
      .thread-header-copy .sub {
        color: #7c879b;
      }
      .thread-header-tabs {
        display: flex;
        gap: 10px;
        margin-top: 8px;
      }
      .thread-tab {
        border-radius: 10px;
        padding: 6px 12px;
        background: #edf2ff;
        color: #4760b8;
        font-size: 13px;
        font-weight: 700;
        border: 1px solid #d9e3f6;
        cursor: pointer;
      }
      .thread-tab.passive {
        background: transparent;
        color: #65738c;
      }
      .brief-tab-btn {
        appearance: none;
        outline: none;
      }
      .thread-header-tools {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 12px;
        color: #7c879b;
        font-size: 18px;
        flex: 0 0 auto;
        justify-content: flex-end;
      }
      .thread-canvas {
        flex: 1;
        min-height: 0;
        overflow: auto;
        padding: 28px 28px 18px;
        background: linear-gradient(180deg, #fbfcff 0%, #f7f9fe 100%);
      }
      .brief-workspace {
        display: flex;
        flex-direction: column;
        gap: 18px;
      }
      .brief-summary-card {
        background: rgba(255, 255, 255, 0.96);
        border-radius: 16px;
        border: 1px solid #ecf0f7;
        box-shadow: 0 12px 22px rgba(196, 204, 221, 0.14);
        padding: 18px;
      }
      .brief-summary-card h3 {
        margin: 0 0 10px;
        font-size: 16px;
        color: #24314d;
      }
      .brief-toolbar {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }
      .assistant-block {
        display: flex;
        gap: 14px;
        align-items: flex-start;
        margin-bottom: 22px;
      }
      .assistant-badge {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        background: linear-gradient(135deg, #4d7dff, #5c69ff);
        color: #fff;
        display: grid;
        place-items: center;
        font-size: 18px;
        flex: 0 0 auto;
      }
      .assistant-content {
        flex: 1;
        min-width: 0;
      }
      .assistant-link {
        color: #3466d6;
        font-size: 16px;
        font-weight: 500;
        text-decoration: none;
      }
      .assistant-link:hover {
        text-decoration: underline;
      }
      .doc-card {
        margin-top: 12px;
        background: rgba(255, 255, 255, 0.96);
        border-radius: 16px;
        border: 1px solid #ecf0f7;
        box-shadow: 0 12px 22px rgba(196, 204, 221, 0.14);
        padding: 16px 16px 14px;
      }
      .doc-card h3 {
        margin: 0;
        font-size: 16px;
        color: #24314d;
      }
      .doc-preview {
        margin-top: 14px;
        border: 1px solid #e8edf7;
        border-radius: 12px;

      const API_BASE =
        window.location.protocol === "file:"
          ? "http://127.0.0.1:8788"
          : `${window.location.protocol}//${window.location.host}`;

      function safeJsonParse(raw) {
        try {
          return JSON.parse(raw);
        } catch (e) {
          return null;
        }
      }

      function getSession() {
        const raw = localStorage.getItem("polaris_demo_session");
        const s = raw ? safeJsonParse(raw) : null;
        if (!s || !s.username || !s.user_tag) return null;
        return { username: String(s.username), label: String(s.label || s.username), user_tag: String(s.user_tag) };
      }

      function setSession(session) {
        if (!session) {
          localStorage.removeItem("polaris_demo_session");
          return;
        }
        localStorage.setItem("polaris_demo_session", JSON.stringify(session));
      }

      function getPushes() {
        const raw = localStorage.getItem("polaris_demo_pushes");
        const parsed = raw ? safeJsonParse(raw) : null;
        return Array.isArray(parsed) ? parsed : [];
      }

      function setPushes(pushes) {
        localStorage.setItem("polaris_demo_pushes", JSON.stringify(Array.isArray(pushes) ? pushes : []));
      }

      function badge(tone, text) {
        const t = tone || "watch";
        return `<span class="badge ${t}">${escapeHtml(text)}</span>`;
      }

      function priBadge(priority) {
        const p = priority || "low";
        return `<span class="badge ${p === "high" ? "high" : p === "medium" ? "medium" : "watch"}">${escapeHtml(
          String(p).toUpperCase(),
        )}</span>`;
      }

      function escapeHtml(value) {
        return String(value || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      async function requestJson(path, init) {
        const target = /^https?:\/\//i.test(path) ? path : `${API_BASE}${path}`;
        const res = await fetch(target, init);
        const text = await res.text();
        const json = text ? safeJsonParse(text) : {};
        if (!res.ok) {
          const msg = (json && (json.detail || json.error)) || `HTTP ${res.status}`;
          throw new Error(String(msg));
        }
        return json;
      }

      function openDrawer(html) {
        $drawerBody.innerHTML = html;
        $drawer.classList.add("open");

        $drawer.classList.remove("open");

      $drawerClose.addEventListener("click", closeDrawer);
      window.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeDrawer();
      });

              </div>
              <div class="card" style="margin-top: 12px;">
                <div class="muted" style="font-size: 13px; line-height: 1.6;">${escapeHtml((s.strategy_keywords || []).join(", "))}</div>
              </div>
            `);
          } catch (e) {
            openDrawer(`<div class="danger">${escapeHtml(String(e.message || e))}</div>`);
          }
        });

        async function renderStrategyEditor() {
          const box = document.getElementById("strategyBox");
          if (!box) return;
          const isStrategic = session.user_tag === "A";
          const isBusiness = String(session.user_tag || "").startsWith("B");
          let strategy = [];
          try {
            const s = await requestJson("/strategy");
            strategy = Array.isArray(s.strategy_keywords) ? s.strategy_keywords : [];
          } catch (e) {}
          const strategyCard = `
            <div class="card" style="margin-bottom: 12px;">
              <div class="row" style="justify-content: space-between;">
                <div style="font-size: 12px; font-weight: 900;">策略关键词（仅集团战略层可更新，其他层级可查看）</div>
              </div>
              <div class="sub" style="margin-top: 8px;">用于统一当前战略重点与主题方向</div>
              <textarea id="strategyInput" style="margin-top: 10px; color: #1f2737;" rows="3" ${isStrategic ? "" : "readonly"}>${escapeHtml(strategy.join(", "))}</textarea>
              <div class="row" style="justify-content: flex-end; margin-top: 10px;">
                ${
                  isStrategic
                    ? `<button class="btn" id="saveStrategyBtn" type="button">保存策略</button>`
                    : `<span class="pill">当前层级仅查看</span>`
                }
              </div>
            </div>
          `;
          const minutesCard = isBusiness
            ? `
              <div class="card" style="margin-bottom: 12px;">
                <div class="row" style="justify-content: space-between;">
                  <div style="font-size: 12px; font-weight: 900;">导入会议纪要（业务决策层）</div>
                  <span class="pill">提炼重点</span>
                </div>
                <div class="sub" style="margin-top: 8px;">粘贴会议纪要后，自动提炼出建议关注的关键词</div>
                <textarea id="minutesInput" style="margin-top: 10px; color: #1f2737;" rows="5" placeholder="粘贴会议纪要、业务讨论记录或项目同步摘要"></textarea>
                <div class="row" style="justify-content: flex-end; margin-top: 10px;">
                  <button class="btn" id="extractMinutesBtn" type="button">导入并提炼</button>
                </div>
              </div>
            `
            : "";
          box.innerHTML = `${strategyCard}${minutesCard}`;
          const $saveBtn = document.getElementById("saveStrategyBtn");
          if ($saveBtn) {
            $saveBtn.addEventListener("click", async () => {
              const input = document.getElementById("strategyInput").value || "";
              const next = input
                .split(/[,，、\n]/)
                .map((x) => x.trim())
                .filter(Boolean);
              if (!next.length) return;
              try {
                await requestJson("/strategy", {
                  method: "PUT",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ strategy_keywords: next }),
                });
                await renderStrategyEditor();
                await runAnalyze();
              } catch (e) {
                openDrawer(`<div class="danger">${escapeHtml(String(e.message || e))}</div>`);
              }
            });
          }
          const $extractBtn = document.getElementById("extractMinutesBtn");
          if ($extractBtn) {
            $extractBtn.addEventListener("click", async () => {
              const minutes = (document.getElementById("minutesInput").value || "").trim();
              if (!minutes) return;
              try {
                const result = await requestJson("/strategy/extract", {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ minutes, method: "textrank", max_keywords: 8, apply: false }),
                });
                openDrawer(`
                  <div class="row">
                    ${badge("watch", "会议纪要提炼结果")}
                  </div>
                  <div class="card" style="margin-top: 12px;">
                    <div class="muted" style="font-size: 13px; line-height: 1.8;">${escapeHtml((result.strategy_keywords || []).join("，"))}</div>
                  </div>
                `);
              } catch (e) {
                openDrawer(`<div class="danger">${escapeHtml(String(e.message || e))}</div>`);
              }
            });
          }
        }

        async function runAnalyze() {
          const pushes = getPushes();
          document.getElementById("pushCount").textContent = String(pushes.length);
          try {
            const payload = { source: "supabase", manual_pushes: pushes };
            const result = await requestJson("/analyze", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            });
            const feeds = result && result.feeds ? result.feeds : {};
            const cards = session.user_tag === "A" ? feeds.A || [] : feeds[session.user_tag] || [];
            document.getElementById("metricsMsg").textContent = cards.length
              ? `已为${session.label}整理 ${cards.length} 条战略简报`
              : `当前暂无适合${session.label}查看的战略简报`;
            document.getElementById("pluginList").innerHTML = pluginListHtml(cards);
            bindCardClick(cards);
          } catch (e) {
            document.getElementById("metricsMsg").textContent = "暂时无法加载战略简报";
            document.getElementById("pluginList").innerHTML = `<div class="danger">请稍后再试</div>`;
          }
        }

        function bindCardClick(cards) {
          const nodes = Array.from(document.querySelectorAll(".item[data-insight]"));
          nodes.forEach((node) => {
            node.addEventListener("click", () => {
              const id = node.getAttribute("data-insight");
              const card = cards.find((c) => c.insight_id === id);
              if (!card) return;
              openDrawer(drawerHtml(card, session));
              bindDrawerActions(card, session);
            });
          });
        }

        function drawerHtml(card, session) {
          const tone = (card.ui && card.ui.tone) || "watch";
          const badgeText = (card.ui && card.ui.badge) || tone;
          const pri = (card.ui && card.ui.priority) || "low";
          const pushCount = card.push && typeof card.push.push_count === "number" ? card.push.push_count : 0;
          const canPush = session.user_tag !== "A" && String(card.audience_level || "") !== "A";
          const sourceList = (card.source_cards || [])
            .map((s) => {
              const link = s.source_url ? `<a href="${escapeHtml(s.source_url)}" target="_blank" rel="noreferrer" class="btn" style="padding: 6px 10px;">打开</a>` : "";
              return `
                <div class="card" style="margin-top: 10px;">
                  <div class="row" style="justify-content: space-between;">
                    <div style="font-weight: 900; font-size: 13px;">${escapeHtml(s.title || "（无标题）")}</div>
                    ${link}
                  </div>
                  <div class="sub" style="margin-top: 8px;">${escapeHtml(s.summary || "")}</div>
                  <div class="sub" style="margin-top: 10px;">${escapeHtml(s.region || "unknown")} · ${escapeHtml(s.topic || "unknown")} · ${escapeHtml(
                s.strategic_vertical || "unknown",
              )}</div>
                </div>
              `;
            })
            .join("");

          return `
            <div class="row">
              ${badge(tone, badgeText)}
              ${priBadge(pri)}
              <span class="pill">重点关注 ${pushCount}</span>
              <span class="pill">${escapeHtml(card.audience_level)} 层级</span>
            </div>
            <h2 style="margin-top: 12px;">${escapeHtml(card.title)}</h2>
            <div class="sub" style="margin-top: 10px;">${escapeHtml(card.summary || "")}</div>
            <div class="card" style="margin-top: 12px; font-size: 13px; line-height: 1.55; color: var(--fg);">
              ${escapeHtml(card.insight || "")}
            </div>
            ${
              canPush
                ? `<div class="row" style="margin-top: 12px;"><button class="btn" type="button" id="pushBtn">Push（加入 A 晋升演示）</button></div>`
                : ""
            }
            <div style="margin-top: 16px; font-size: 12px; font-weight: 900;">来源</div>
            ${sourceList || `<div class="sub" style="margin-top: 10px;">暂无来源卡</div>`}
          `;
        }

        function bindDrawerActions(card, session) {
          const $btn = document.getElementById("pushBtn");
          if (!$btn) return;
          $btn.addEventListener("click", async () => {
            const pushes = getPushes();
            pushes.push({
              insight_id: card.insight_id,
              actor_tag: session.user_tag,
              action: "push",
              timestamp: new Date().toISOString(),
              id: "push_" + Date.now(),
            });
            setPushes(pushes);
            closeDrawer();
            await runAnalyze();
          });
        }

        renderStrategyEditor();
        runAnalyze();
      }

      const session = getSession();
      if (session) {
        renderWork();
      } else {
        renderLogin();
      }
    </script>
  </body>
</html>
